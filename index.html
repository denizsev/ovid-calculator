<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ovid Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
   <source src="images/spacetravel-loop.mp4" type="video/mp4">
</video>

<div class="app-title">OVID CALCULATOR</div>

<main class="main-section">

<section class="calculator">

    <!-- DISPLAY -->
    <div id="display">
        <div class="top">0</div>
        <div class="bottom">0</div>
    </div>

    <div class="calculator-divider" aria-hidden="true"></div>

    <!-- BUTTONS -->
    <div class="buttons">

        <button id="clear">C</button>
        <button id="backspace">⌫</button>
        <button id="plusminus">+/-</button>
        <button id="divide">/</button>

        <button class="num">7</button>
        <button class="num">8</button>
        <button class="num">9</button>
        <button id="times">*</button>

        <button class="num">4</button>
        <button class="num">5</button>
        <button class="num">6</button>
        <button id="minus">-</button>

        <button class="num">1</button>
        <button class="num">2</button>
        <button class="num">3</button>
        <button id="plus">+</button>

        <button class="num zero">0</button>
        <button class="num">.</button>
        <button id="equals" class="equal">=</button>

    </div>

</section>

</main>
<footer class="calc-footer">

    Powered by Deniz • Ovid Calculator

</footer>

<script src="myJava.js"></script>
</body>
</html>
